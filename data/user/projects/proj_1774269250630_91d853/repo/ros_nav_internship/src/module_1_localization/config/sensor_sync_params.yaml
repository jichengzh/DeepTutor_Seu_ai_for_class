sensor_synchronizer:
  ros__parameters:
    # ----------------------------------------------------------------
    # Input topic names
    # ----------------------------------------------------------------
    scan_topic: "scan"
    imu_topic:  "imu/data"
    odom_topic: "odom"

    # ----------------------------------------------------------------
    # Synchronization settings
    # sync_tolerance_ms: maximum allowed time gap between messages in
    #   a synchronised triplet before a warning is emitted (ms).
    # queue_size: message_filters internal queue depth per topic.
    #   Larger values allow more buffering but increase memory usage.
    # ----------------------------------------------------------------
    sync_tolerance_ms: 10.0
    queue_size: 50
