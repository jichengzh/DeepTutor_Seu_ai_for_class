# hybrid_astar_params.yaml
# Configuration for the HybridAStarPlanner nav2_core::GlobalPlanner plugin.
# These parameters are loaded by PathSearcher and by the Nav2 planner_server.

planner_server:
  ros__parameters:
    expected_planner_frequency: 1.0
    use_sim_time: false
    planners: ["GridBased"]
    GridBased:
      plugin: "module_2_planning/HybridAStarPlanner"

      # ── Search grid ──────────────────────────────────────────────────────────
      # Angular resolution per bin (radians).  72 bins ≈ 5° per bin.
      angle_resolution: 0.0873

      # Minimum turning radius of the vehicle (metres).
      min_turning_radius: 0.5

      # Arc length advanced per expansion step (metres).
      step_size: 0.5

      # Number of steering angles to each side (0 = straight).
      # Total primitives = 2 * num_steering_angles + 1
      num_steering_angles: 3

      # ── Timing ───────────────────────────────────────────────────────────────
      # Maximum wall-clock time (seconds) before the planner gives up.
      max_planning_time: 5.0

      # ── Costmap ──────────────────────────────────────────────────────────────
      # Costmap cell values at or above this threshold are treated as obstacles.
      obstacle_cost_threshold: 200.0

path_searcher:
  ros__parameters:
    use_sim_time: false
    planner_name: "HybridAStarPlanner"
    global_frame: "map"

    # ── Costmap for standalone PathSearcher ──────────────────────────────────
    path_searcher_costmap:
      ros__parameters:
        update_frequency: 5.0
        publish_frequency: 2.0
        global_frame: map
        robot_base_frame: base_link
        use_sim_time: false
        rolling_window: false
        width: 10
        height: 10
        resolution: 0.05
        robot_radius: 0.22
        plugins: ["static_layer", "inflation_layer"]
        static_layer:
          plugin: "nav2_costmap_2d::StaticLayer"
          map_subscribe_transient_local: true
        inflation_layer:
          plugin: "nav2_costmap_2d::InflationLayer"
          cost_scaling_factor: 3.0
          inflation_radius: 0.55
        always_send_full_costmap: true

    HybridAStarPlanner:
      angle_resolution:        0.0873
      min_turning_radius:      0.5
      step_size:               0.5
      num_steering_angles:     3
      max_planning_time:       5.0
      obstacle_cost_threshold: 200.0
